<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#5c3d89" />
  <link rel="icon" href="fav_icon.ico" type="image/x-icon">
  <title>Painel LS MAPAS</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: "Montserrat", sans-serif;
      padding: 20px;
      background-color: #fafafa;
    }
    h1 {
      text-align: center;
      color: #5c3d89;
    }
    .btn-custom {
      background-color: #5a2d82;
      color: white;
      border: none;
      padding: 8px 14px;
      border-radius: 6px;
      font-weight: 500;
      cursor: pointer;
    }
    .btn-custom:hover { background-color: #452160; }
    .top-bar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 15px;
    }
    .indicadores {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px;
      margin: 25px 0;
    }
    .card {
      background: white;
      border-radius: 8px;
      box-shadow: 0 0 8px rgba(0,0,0,0.1);
      padding: 15px 20px;
      text-align: center;
      min-width: 180px;
    }
    .card h3 {
      font-size: 15px;
      color: #5c3d89;
      margin-bottom: 5px;
    }
    .card p {
      font-size: 16px;
      font-weight: bold;
      margin: 0;
    }
    .alerta {
      color: #f44336;
      font-weight: bold;
      animation: piscar 1s infinite alternate;
    }
    @keyframes piscar {
      from { opacity: 1; }
      to { opacity: 0.4; }
    }
    .graficos-lado-a-lado {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 40px;
      flex-wrap: wrap;
      margin-top: 40px;
    }
    .grafico-container,
    .grafico-barras {
      flex: 1 1 420px;
      max-width: 420px;
      aspect-ratio: 1 / 1;
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 0 10px rgba(0,0,0,0.05);
      display: flex;
      justify-content: center;
      align-items: center;
    }
    canvas {
      width: 100% !important;
      height: 100% !important;
      object-fit: contain;
    }
    .filtro {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    select {
      padding: 8px 12px;
      border-radius: 5px;
      border: 1px solid #5c3d89;
      font-size: 14px;
      background-color: white;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 30px;
      background: white;
      box-shadow: 0 0 8px rgba(0,0,0,0.05);
    }
    th, td {
      border: 1px solid #ddd;
      padding: 8px;
      text-align: left;
      font-size: 14px;
    }
    th {
      background-color: #5c3d89;
      color: white;
    }
    #status {
      text-align: center;
      color: #5c3d89;
    }
    #mapasAntigos {
      background: white;
      box-shadow: 0 0 8px rgba(0,0,0,0.1);
      border-radius: 8px;
      padding: 15px 25px;
      max-width: 600px;
      margin: 0 auto 30px auto;
    }
    #mapasAntigos h3 {
      margin-bottom: 10px;
      color: #5c3d89;
      text-align: center;
    }
    #listaAntigos li {
      font-size: 15px;
      margin: 5px 0;
    }
    #btnS13 {
      display: block;
      margin: 0 auto 25px auto;
      background-color: #5a2d82;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 10px 20px;
      font-weight: 500;
      cursor: pointer;
    }
    #btnS13:hover { background-color: #452160; }
  </style>
</head>
<body>
  <div class="top-bar">
    <button class="btn-custom" onclick="voltar()">⬅ Voltar ao Admin</button>
  </div>

  <h1>Painel de Resultados LS MAPAS</h1>

  <div class="indicadores" id="indicadores">
    <div class="card"><h3>Último ciclo</h3><p id="ultimoCiclo">-</p></div>
    <div class="card"><h3>Média dos ciclos</h3><p id="mediaCiclos">-</p></div>
    <div class="card"><h3>Faltam p/ fechar o ciclo atual</h3><p id="mapasRestantes">-</p></div>
    <div class="card"><h3>Status atual</h3><p id="statusCiclo">-</p></div>
  </div>
  <p style="text-align:center; font-size:12px; color:#888; margin-top:-15px;">
    (calculado com o histórico completo: ciclo atual + abas de backup "VISITA FINALIZADA...")
  </p>

  <!-- Botão e barra de progresso -->
  <button id="btnS13">📄 Gerar S-13</button>
  <div id="progressoS13" style="display:none; width:100%; max-width:300px; margin:10px auto;">
    <div id="barraS13" style="height:8px; background:#5c3d89; width:0%; transition:width 0.3s;"></div>
  </div>

  <div id="mapasAntigos">
    <h3>🕒 Mapas com mais tempo sem atualização</h3>
    <ul id="listaAntigos" style="list-style:none; padding-left:0; margin-top:10px; text-align:left;"></ul>
  </div>

  <div class="filtro">
    <label for="filtroMapa">Filtrar por mapa:</label>
    <select id="filtroMapa">
      <option value="todos">Todos</option>
    </select>
  </div>

  <p id="status">⏳ Carregando dados...</p>

  <div class="graficos-lado-a-lado">
    <div class="grafico-container"><canvas id="grafico"></canvas></div>
    <div class="grafico-barras"><canvas id="graficoCiclos"></canvas></div>
  </div>

  <div id="tabela"></div>

<script>
const workerURL = "https://ls-mapas-proxy.lspatosdeminas.workers.dev";
const token = sessionStorage.getItem("authToken");

if (!token) {
  document.body.innerHTML = "<h3 style='text-align:center;color:#5a2d82;'>Acesso negado. Faça login pelo admin.</h3>";
  throw new Error("Token ausente");
}

let dadosGlobais = [];       // apenas o ciclo atual (aba "Respostas") - usado no gráfico/tabela principal
let historicoCompleto = [];  // Respostas + todas as abas de backup - usado pra média de ciclo e "mapas antigos"
let mapasAtivos = [];         // lista real de territórios cadastrados hoje (aba "mapas")
let graficoPizza, graficoCiclos;

async function carregarDados() {
  try {
    const [resRespostas, resMapas, resAbas] = await Promise.all([
      fetch(`${workerURL}?acao=read&aba=Respostas`, { headers: { "x-auth-token": token } }),
      fetch(`${workerURL}?acao=read&aba=mapas`, { headers: { "x-auth-token": token } }),
      fetch(`${workerURL}?acao=listarabas`, { headers: { "x-auth-token": token } })
    ]);
    const dados = await resRespostas.json();
    const dadosMapas = await resMapas.json();
    const dadosAbas = await resAbas.json();

    if (dados.erro && dados.erro.includes("Sessão")) {
      alert("Sessão expirada. Faça login novamente.");
      window.location.href = "admin.html";
      return;
    }
    dadosGlobais = dados.registros || [];
    mapasAtivos = [...new Set((dadosMapas.registros || []).map(r => (r.Mapa || "").trim()).filter(Boolean))];

    // Busca as abas de backup ("VISITA FINALIZADA ...") e junta com o ciclo atual,
    // pra ter o histórico completo sem cortes causados pelo reset de 6 em 6 meses.
    const nomesAbas = dadosAbas.abas || [];
    const nomesBackup = nomesAbas.filter(n => n.toUpperCase().startsWith("VISITA FINALIZADA"));

    const respostasBackup = await Promise.all(
      nomesBackup.map(nome =>
        fetch(`${workerURL}?acao=read&aba=${encodeURIComponent(nome)}`, { headers: { "x-auth-token": token } })
          .then(r => r.json())
          .then(d => d.registros || [])
          .catch(() => [])
      )
    );

    historicoCompleto = [...dadosGlobais, ...respostasBackup.flat()];

    document.getElementById("status").style.display = "none";
    preencherFiltro();
    atualizarPainel("todos");
    calcularIndicadores();
    mostrarMapasAntigos();
  } catch (err) {
    console.error("Erro:", err);
    document.getElementById("status").textContent = "❌ Erro ao carregar dados.";
  }
}

function preencherFiltro() {
  const filtro = document.getElementById("filtroMapa");
  const mapasComHistorico = historicoCompleto.map(d => d.Setor || d.setor);
  const mapas = [...new Set([...mapasAtivos, ...mapasComHistorico])].filter(Boolean).sort();
  mapas.forEach(mapa => {
    const opt = document.createElement("option");
    opt.value = mapa;
    opt.textContent = mapa;
    filtro.appendChild(opt);
  });
  filtro.addEventListener("change", e => atualizarPainel(e.target.value));
}

function atualizarPainel(mapaSelecionado) {
  const filtrados = mapaSelecionado === "todos"
    ? dadosGlobais
    : dadosGlobais.filter(d => (d.Setor || d.setor) === mapaSelecionado);

  const encontrados = filtrados.filter(d => (d.Status || d.status) === "Encontrado").length;
  const naoEncontrados = filtrados.filter(d => (d.Status || d.status) === "Não encontrado").length;

  if (graficoPizza) graficoPizza.destroy();
  graficoPizza = new Chart(document.getElementById("grafico"), {
    type: "doughnut",
    data: {
      labels: ["Encontrado", "Não encontrado"],
      datasets: [{ data: [encontrados, naoEncontrados], backgroundColor: ["#4caf50", "#f44336"] }]
    },
    options: { plugins: { legend: { position: "bottom" } } }
  });

  const linhas = filtrados.map(d => `
    <tr>
      <td>${d["Data e Hora"] || d.dataHora}</td>
      <td>${d.Setor || d.setor}</td>
      <td>${d.Endereco || d.Endereço || d.endereco}</td>
      <td>${d.Status || d.status}</td>
    </tr>`).join("");

  document.getElementById("tabela").innerHTML = `
    <table>
      <tr><th>Data/Hora</th><th>Mapa</th><th>Endereço</th><th>Status</th></tr>
      ${linhas || "<tr><td colspan='4'>Nenhum registro encontrado.</td></tr>"}
    </table>`;
}

function calcularIndicadores() {
  // Usa o histórico COMPLETO (ciclo atual + abas de backup), pra não cortar
  // um ciclo no meio por causa do reset de 6 em 6 meses.
  const registros = historicoCompleto.map(d => ({
    setor: d.Setor || d.setor,
    data: new Date(d["Data e Hora"] || d.dataHora)
  })).sort((a, b) => a.data - b.data);

  // Usa a lista real de territórios cadastrados hoje (aba "mapas") como referência
  // de um "ciclo completo", em vez de inferir isso do histórico de respostas
  // (que pode ter tido mapas adicionados/removidos ao longo do tempo).
  const totalMapasAtivos = mapasAtivos.length;

  if (totalMapasAtivos === 0 || registros.length === 0) {
    document.getElementById("ultimoCiclo").textContent = "-";
    document.getElementById("mediaCiclos").textContent = "-";
    document.getElementById("mapasRestantes").textContent = "-";
    document.getElementById("statusCiclo").textContent = "Sem dados suficientes";
    gerarGraficoCiclos([]);
    return;
  }

  let visitados = new Set();
  let inicioCiclo = registros[0].data;
  const ciclos = [];

  for (let r of registros) {
    if (mapasAtivos.includes(r.setor)) visitados.add(r.setor);
    if (visitados.size >= totalMapasAtivos) {
      const fim = r.data;
      const duracaoDias = Math.round((fim - inicioCiclo) / (1000 * 60 * 60 * 24));
      ciclos.push({ inicio: inicioCiclo, fim, duracaoDias });
      visitados = new Set();
      inicioCiclo = r.data;
    }
  }

  const ultimo = ciclos[ciclos.length - 1];
  const media = ciclos.length ? ciclos.reduce((a, b) => a + b.duracaoDias, 0) / ciclos.length : 0;
  const hoje = new Date();
  const cicloAtualDias = Math.round((hoje - inicioCiclo) / (1000 * 60 * 60 * 24));
  const restantes = totalMapasAtivos - visitados.size; // "visitados" aqui reflete o ciclo em andamento (ainda não fechado)

  document.getElementById("ultimoCiclo").textContent = ultimo ? `${ultimo.duracaoDias} dias` : "-";
  document.getElementById("mediaCiclos").textContent = ciclos.length ? `${media.toFixed(1)} dias` : "-";
  document.getElementById("mapasRestantes").textContent = `${restantes} de ${totalMapasAtivos}`;

  const statusCiclo = document.getElementById("statusCiclo");
  if (ciclos.length === 0) {
    statusCiclo.textContent = "Ainda no primeiro ciclo";
    statusCiclo.style.color = "#5c3d89";
  } else if (cicloAtualDias > media) {
    statusCiclo.innerHTML = `<span class="alerta">Atrasado (${cicloAtualDias} dias)</span>`;
  } else {
    statusCiclo.textContent = `Dentro da média (${cicloAtualDias} dias)`;
    statusCiclo.style.color = "#4caf50";
  }

  gerarGraficoCiclos(ciclos);
}

function gerarGraficoCiclos(ciclos) {
  if (graficoCiclos) graficoCiclos.destroy();
  if (ciclos.length === 0) return;
  const labels = ciclos.map((c, i) => `Ciclo ${i + 1}`);
  const valores = ciclos.map(c => c.duracaoDias);
  graficoCiclos = new Chart(document.getElementById("graficoCiclos"), {
    type: "bar",
    data: {
      labels,
      datasets: [{ label: "Duração (dias)", data: valores, backgroundColor: "#5c3d89" }]
    },
    options: {
      plugins: { legend: { display: false }, title: { display: true, text: "Duração de cada ciclo (em dias)" } },
      scales: { y: { beginAtZero: true } }
    }
  });
}

function mostrarMapasAntigos() {
  // Usa o histórico completo (atual + backups) pra achar a última visita real
  // de cada mapa, não só o que sobrou depois do último reset.
  const registrosPorMapa = {};
  historicoCompleto.forEach(d => {
    const setor = d.Setor || d.setor;
    const data = new Date(d["Data e Hora"] || d.dataHora);
    if (!registrosPorMapa[setor] || data > registrosPorMapa[setor]) registrosPorMapa[setor] = data;
  });

  const hoje = new Date();

  const comHistorico = Object.entries(registrosPorMapa).map(([setor, ultimaData]) => ({
    setor,
    dias: Math.round((hoje - ultimaData) / (1000 * 60 * 60 * 24)),
    semRegistro: false
  }));

  // Mapas cadastrados sem nenhum registro em todo o histórico disponível
  // (ciclo atual + todas as abas de backup encontradas)
  const semRegistroAlgum = mapasAtivos
    .filter(m => !(m in registrosPorMapa))
    .map(setor => ({ setor, dias: Infinity, semRegistro: true }));

  const lista = [...semRegistroAlgum, ...comHistorico];
  lista.sort((a, b) => b.dias - a.dias);
  const top4 = lista.slice(0, 4);

  document.getElementById("listaAntigos").innerHTML = top4.map(item =>
    item.semRegistro
      ? `<li>🔺 <strong>${item.setor}</strong> — sem registro no histórico disponível</li>`
      : `<li>🔸 <strong>${item.setor}</strong> — ${item.dias} dias</li>`
  ).join("");
}

// === Gerar S13 com barra de progresso ===
document.getElementById("btnS13").addEventListener("click", async () => {
  const ano = prompt("Informe o Ano de Serviço (ex: 2025-2026):");
  if (!ano) return;

  const barra = document.getElementById("barraS13");
  const container = document.getElementById("progressoS13");
  container.style.display = "block";
  barra.style.width = "0%";

  let progresso = 0;
  const anim = setInterval(() => {
    progresso = Math.min(progresso + 5, 95);
    barra.style.width = progresso + "%";
  }, 400);

  try {
    const resp = await fetch(`${workerURL}/gerar-s13?anoServico=${encodeURIComponent(ano)}`);
    const data = await resp.json();
    clearInterval(anim);
    barra.style.width = "100%";

    if (data.status === "ok" && data.conteudoBase64) {
      const blob = b64ToBlob(data.conteudoBase64, "application/vnd.openxmlformats-officedocument.wordprocessingml.document");
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = data.nome;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
      alert("✅ S-13 gerado e baixado com sucesso.");
    } else {
      alert("⚠ Erro ao gerar S-13.");
    }
  } catch (err) {
    clearInterval(anim);
    barra.style.background = "#e53935";
    alert("❌ Erro de comunicação: " + err.message);
  }
});

function b64ToBlob(b64, mime) {
  const byteChars = atob(b64);
  const byteNums = new Array(byteChars.length);
  for (let i = 0; i < byteChars.length; i++) byteNums[i] = byteChars.charCodeAt(i);
  return new Blob([new Uint8Array(byteNums)], { type: mime });
}

function voltar() { window.location.href = "admin.html"; }

carregarDados();
</script>
</body>
</html>
