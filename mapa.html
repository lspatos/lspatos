<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mapa — LS Mapas</title>
  <meta name="theme-color" content="#5c3d89" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="icon" href="fav_icon.ico" type="image/x-icon">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="style.css">

  <style>
    .aviso-topo {
      max-width: 640px;
      margin: 14px auto 0;
      padding: 0 16px;
    }
    .aviso-topo .cartao {
      display: flex; gap: 10px; align-items: flex-start;
      background: var(--ambar-bg);
      box-shadow: none;
      font-size: 13.5px;
      color: #7A5417;
      line-height: 1.45;
    }
    .aviso-topo strong { color: #7A5417; }

    #enderecos { max-width: 640px; margin: 0 auto; padding: 6px 16px 50px; }

    .busca-endereco-mapa {
      max-width: 640px;
      margin: 14px auto 0;
      padding: 0 16px;
    }

    .container_end {
      background: #fff;
      border-radius: var(--raio-md);
      box-shadow: var(--sombra-card);
      margin: 14px 0;
      padding: 16px 16px 14px;
    }
    .container_end .cabeca-endereco {
      display: flex; align-items: flex-start; gap: 10px; margin-bottom: 6px;
    }
    .container_end .selo-territorio { width: 30px; height: 30px; font-size: 13px; border-radius: 8px; flex-shrink:0; }
    .container_end h4 {
      font-size: 15.5px;
      font-weight: 600;
      color: var(--tinta);
      overflow-wrap: break-word;
      hyphens: auto;
    }
    .container_end p.ultima-visita { font-size: 13px; font-weight: 600; margin: 2px 0 0 40px; }

    .container_end.restrito { border-left: 5px solid var(--vermelho); background: var(--vermelho-bg); }
    .container_end.restrito h4 { color: #7A1F26; }
    .selo-restricao {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin: 8px 0 0 40px;
      padding: 4px 10px;
      border-radius: 20px;
      background: #fff;
      color: #7A1F26;
      font-size: 12.5px;
      font-weight: 700;
      width: fit-content;
    }

    .resumo-alertas {
      font-size: 12px;
      color: var(--ambar);
      font-weight: 600;
      margin: 6px 0 0 40px;
    }

    /* Endereço marcado após 3 alertas de mudança/falecimento */
    .container_end.em-analise {
      background: #F1EFF4;
      border-left: 5px solid var(--vermelho);
      opacity: 0.72;
    }
    .container_end.em-analise .cabeca-endereco { opacity: .55; }
    .container_end.em-analise h4 {
      font-size: 12.5px;
      color: var(--cinza-400);
      font-weight: 500;
      text-decoration: line-through;
    }
    .container_end.em-analise .ultima-visita { display: none; }
    .badge-analise {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--vermelho);
      color: #fff;
      padding: 10px 14px;
      border-radius: var(--raio-sm);
      font-size: 13.5px;
      font-weight: 700;
      margin-top: 4px;
    }

    /* Botão "Reportar" - mudança/falecimento, junto com os outros botões de ação */
    .btn-reportar {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      color: #fff; background: var(--ambar);
      border: none; border-radius: var(--raio-sm);
      cursor: pointer; height: 52px; font-weight: 600; font-size: 13.5px;
      width: 100%;
    }

    /* Popover de motivo do alerta */
    .popover-alerta {
      position: fixed;
      inset: 0;
      background: rgba(33,27,43,.5);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      z-index: 998;
    }
    .popover-alerta .conteudo {
      background: #fff;
      width: 100%;
      max-width: 420px;
      border-radius: 18px 18px 0 0;
      padding: 22px 20px 26px;
    }
    .popover-alerta h3 { font-size: 16px; margin-bottom: 4px; }
    .popover-alerta .aviso-anterior-popover {
      background: var(--ambar-bg); color: #7A5417;
      padding: 8px 10px; border-radius: 8px;
      font-size: 12.5px; font-weight: 600; margin-bottom: 10px;
    }
    .popover-alerta p { font-size: 13px; color: var(--cinza-700); margin-bottom: 16px; }
    .popover-alerta button.opcao {
      display: block; width: 100%; text-align: left;
      background: var(--roxo-50); border: none; border-radius: 10px;
      padding: 13px 14px; margin-bottom: 8px; font-size: 14.5px; font-weight: 600;
      color: var(--tinta); cursor: pointer;
    }
    .popover-alerta button.opcao:hover { background: var(--roxo-100); }
    .popover-alerta button.cancelar {
      display: block; width: 100%; text-align: center;
      background: none; border: none; color: var(--cinza-400);
      padding: 10px; margin-top: 4px; font-size: 14px; cursor: pointer;
    }

    /* Modal do mapa embutido (Google Maps Embed, sem sair do site) */
    .popover-mapa {
      position: fixed;
      inset: 0;
      background: rgba(33,27,43,.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 998;
      padding: 16px;
    }
    .popover-mapa .conteudo-mapa {
      background: #fff;
      width: 100%;
      max-width: 480px;
      border-radius: var(--raio-lg);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .popover-mapa .cabecalho-mapa {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px; gap: 10px;
    }
    .popover-mapa .cabecalho-mapa h3 {
      font-size: 14.5px; overflow-wrap: break-word; flex: 1;
    }
    .popover-mapa .fechar-mapa {
      flex-shrink: 0; width: 32px; height: 32px; border-radius: 50%;
      border: none; background: var(--roxo-50); color: var(--cinza-700);
      font-size: 15px; cursor: pointer;
    }
    .popover-mapa iframe {
      width: 100%; height: 320px; border: none; display: block;
    }
    .popover-mapa .btn { margin: 14px 16px 16px; width: calc(100% - 32px); }

    .entradas { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
    .entradas button, .entradas a { flex: 1 1 90px; }
    .btn-verde, .btn-vermelho, .btn-endereco {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      color: #fff; border: none; border-radius: var(--raio-sm);
      cursor: pointer; height: 52px; font-weight: 600; font-size: 13.5px;
      width: 100%;
    }
    .btn-verde { background: var(--verde); }
    .btn-vermelho { background: var(--vermelho); }
    .btn-endereco { background: var(--roxo-400); }
    button:disabled { opacity: .55; cursor: not-allowed; }

    /* Modal de identificação */
    .modal {
      display: flex;
      position: fixed;
      z-index: 999;
      top: 0; left: 0; right: 0; bottom: 0;
      justify-content: center;
      align-items: center;
      background-color: rgba(33, 27, 43, 0.55);
      padding: 20px;
    }
    .modal-content {
      background: #fff;
      padding: 28px 26px;
      border-radius: var(--raio-lg);
      text-align: center;
      box-shadow: var(--sombra-flutuante);
      width: 100%;
      max-width: 340px;
    }
    .modal-content h2 { font-size: 18px; margin-bottom: 16px; }
    .modal-content select { margin-bottom: 16px; }
    .modal-content .btn { width: 100%; }

    .spinner {
      border: 6px solid var(--roxo-100);
      border-top: 6px solid var(--roxo-600);
      border-radius: 50%;
      width: 46px;
      height: 46px;
      animation: girar 1s linear infinite;
    }
    @keyframes girar { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <!-- Modal de identificação -->
  <div id="identificacaoModal" class="modal">
    <div class="modal-content">
      <h2>Quem é o dirigente hoje?</h2>
      <select id="responsavelSelect">
        <option value="">Selecione o dirigente</option>
        <option value="Bruno">Bruno</option>
        <option value="Diego">Diego</option>
        <option value="Dieison">Dieison</option>
        <option value="Elismar">Elismar</option>
        <option value="Guilherme">Guilherme</option>
        <option value="Jhonatan">Jhonatan</option>
        <option value="Luís">Luís</option>
        <option value="Lucas">Lucas</option>
        <option value="Neiff">Neiff</option>
        <option value="Pedro Paulo">Pedro Paulo</option>
        <option value="Rafael">Rafael</option>
        <option value="Viajante">Viajante</option>
        <option value="Victor">Victor</option>
      </select>
      <button id="confirmarResponsavel" class="btn btn-primario">Confirmar</button>
    </div>
  </div>

  <header class="topo-app">
    <a href="/">
      <button class="btn-voltar"><img src="home.png" alt="Voltar ao início" /></button>
    </a>
    <h1 id="tituloMapa"></h1>
  </header>

  <div class="aviso-topo">
    <div class="cartao">
      <span>ℹ️</span>
      <span><strong>Atenção:</strong> após clicar, aguarde a mensagem "Resposta registrada com sucesso!" antes de sair da tela.</span>
    </div>
  </div>

  <div class="busca-endereco-mapa">
    <input type="search" id="buscaEndereco" placeholder="🔎 Buscar endereço neste mapa...">
  </div>

  <section id="enderecos"></section>

  <script src="script.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const numeroMapa = params.get("mapa");
    const nomeMapa = "Mapa " + numeroMapa;

    document.getElementById("tituloMapa").innerText = nomeMapa;
    gerarEnderecos(nomeMapa);

    // Busca simples: filtra os cartões já carregados pelo texto do endereço,
    // ignorando acentuação (usa removerAcentos, já definida em script.js).
    document.getElementById("buscaEndereco").addEventListener("input", (e) => {
      const termo = removerAcentos(e.target.value.trim().toLowerCase());
      document.querySelectorAll("#enderecos .container_end").forEach(card => {
        const titulo = card.querySelector("h4");
        const texto = titulo ? removerAcentos(titulo.textContent.toLowerCase()) : "";
        card.style.display = texto.includes(termo) ? "" : "none";
      });
    });
  </script>
</body>
</html>
