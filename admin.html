<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Administrativo — LS PATOS</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    body {
      background: #f5f4f8;
      font-family: "Montserrat", sans-serif;
    }
    h1 {
      color: #5a2d82;
      font-weight: 700;
      text-align: center;
      margin: 40px 0 20px;
    }
    table {
      background: #fff;
      border-radius: 6px;
      overflow: hidden;
    }
    th {
      background-color: #5a2d82;
      color: white;
      text-align: center;
    }
    td, th { padding: 10px; text-align: center; }
    .btn-custom { background-color: #5a2d82; color: white; border: none; }
    .btn-custom:hover { background-color: #452160; }
    /* --- Tela de login estilizada --- */
    #loginScreen {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(160deg,#5a2d82 40%,#7c52b0);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    #loginCard {
      background: white;
      padding: 30px 40px;
      border-radius: 12px;
      width: 320px;
      box-shadow: 0 0 20px rgba(0,0,0,0.2);
      text-align: center;
    }
    #loginCard h2 {
      color: #5a2d82;
      margin-bottom: 20px;
      font-weight: 700;
    }
    #loginCard input {
      margin-bottom: 15px;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      width: 100%;
      font-size: 15px;
    }
    #loginCard button {
      width: 100%;
      padding: 10px;
      background: #5a2d82;
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
    }
    #loginCard button:hover { background: #452160; }
    #loginMsg { color: #f44336; margin-top: 8px; }
  </style>
</head>
<body>

  <!-- 🔐 Tela de Login -->
  <div id="loginScreen">
    <div id="loginCard">
      <h2>Login Administrativo</h2>
      <input type="text" id="usuario" placeholder="Usuário">
<div style="position:relative; width:100%;">
  <input type="password" id="senha" placeholder="Senha" class="form-control"
         style="padding-right:38px;">
  <img id="toggleSenha" src="hide.png" alt="Mostrar senha"
       style="position:absolute; right:10px; top:50%; transform:translateY(-50%);
              width:20px; height:20px; cursor:pointer; opacity:0.8;">
</div>
      <button onclick="login()">Entrar</button>
      <div id="loginMsg"></div>
    </div>
  </div>

  <!-- 🔧 Painel Administrativo -->
  <div id="painel" class="container mt-4" style="display:none;">
    <h1>Painel Administrativo — LS PATOS</h1>
    <div class="card p-3 mb-4">
      <div class="row g-2">
        <div class="col-md-3">
          <input type="text" id="mapa" class="form-control" placeholder="Mapa (ex: Mapa 01)">
        </div>
        <div class="col-md-4">
          <input type="text" id="endereco" class="form-control" placeholder="Endereço completo">
        </div>
        <div class="col-md-3">
          <input type="text" id="restricao" class="form-control" placeholder="Restrição (opcional)">
        </div>
        <div class="col-md-2 d-flex">
          <button id="salvarBtn" class="btn btn-custom flex-fill me-2">Salvar / Atualizar</button>
          <button id="limparBtn" class="btn btn-secondary flex-fill">Limpar</button>
        </div>
        </div>
          <div class="text-center mt-4">
          <button class="btn btn-custom me-2" onclick="abrirPainel()">📊 Painel</button>
          <button class="btn btn-custom me-2" onclick="abrirRelatorio()">📂 Relatórios</button>
          <button class="btn btn-custom me-2" onclick="abrirS13()">📄 S-13</button>
          <button class="btn btn-secondary me-2" onclick="window.location.href='index.html'">⬅ Início</button>
          <button class="btn btn-secondary" onclick="logout()">Sair</button>
        </div>
      </div>
      <input type="hidden" id="id">
    </div>

    <table class="table table-bordered table-striped">
      <thead>
        <tr>
          <th>ID</th>
          <th>Mapa</th>
          <th>Endereço</th>
          <th>Restrição</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="tabelaMapas"></tbody>
    </table>

<script>
  const workerURL = "https://ls-mapas-proxy.lspatosdeminas.workers.dev/";
  let token = sessionStorage.getItem("authToken");
  let registrosAtuais = [];

  function escapeHTML(str) {
    return String(str)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;");
  }

  // === Login ===
  async function login() {
    const usuario = document.getElementById("usuario").value.trim();
    const senha = document.getElementById("senha").value.trim();
    const msg = document.getElementById("loginMsg");

    msg.textContent = "Validando...";
    try {
      const res = await fetch(workerURL + "login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ usuario, senha })
      });
      const data = await res.json();

      if (data.token) {
        sessionStorage.setItem("authToken", data.token);
        token = data.token;
        iniciarPainel();
      } else {
        msg.textContent = data.erro || "Usuário ou senha incorretos.";
      }
    } catch (err) {
      msg.textContent = "Erro de conexão.";
    }
  }

  function iniciarPainel() {
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("painel").style.display = "block";
    carregarMapas();
  }

  function logout() {
    sessionStorage.removeItem("authToken");
    token = null;
    location.reload();
  }

  // === CRUD Mapas ===
  async function carregarMapas() {
    try {
      const res = await fetch(`${workerURL}?acao=read&aba=mapas`, {
        headers: { "x-auth-token": token }
      });
      const dados = await res.json();

      if (dados.erro && dados.erro.includes("Sessão")) return logout();

      const tbody = document.getElementById("tabelaMapas");
      tbody.innerHTML = "";
      // Guarda os registros num array global e referencia por índice,
      // em vez de montar strings de JS com os dados (evita quebrar com aspas nos endereços)
      registrosAtuais = dados.registros || [];
      registrosAtuais.forEach((item, i) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${escapeHTML(item.ID || "")}</td>
          <td>${escapeHTML(item.Mapa || "")}</td>
          <td>${escapeHTML(item.Endereco || "")}</td>
          <td>${escapeHTML(item.Restricao || "")}</td>
          <td>
            <button class="btn btn-sm btn-warning" onclick="editar(${i})">✏️</button>
            <button class="btn btn-sm btn-danger" onclick="excluir('${item.ID}')">🗑️</button>
          </td>`;
        tbody.appendChild(tr);
      });
    } catch (err) {
      console.error(err);
      alert("Erro ao carregar dados.");
    }
  }

  async function salvar() {
    const mapa = document.getElementById("mapa").value;
    const endereco = document.getElementById("endereco").value;
    const restricao = document.getElementById("restricao").value;
    const id = document.getElementById("id").value || "";

    if (!mapa || !endereco) return alert("Preencha Mapa e Endereço.");

    try {
      const res = await fetch(workerURL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-auth-token": token
        },
        body: JSON.stringify({ acao: id ? "update" : "add", mapa, endereco, restricao, id })
      });
      const data = await res.json();
      if (data.erro && data.erro.includes("Sessão")) return logout();
      alert(data.status || "Registro salvo com sucesso.");
      limpar();
      carregarMapas();
    } catch {
      alert("Erro ao salvar.");
    }
  }

  async function excluir(id) {
    if (!confirm("Excluir registro?")) return;
    try {
      const res = await fetch(workerURL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-auth-token": token
        },
        body: JSON.stringify({ acao: "delete", id })
      });
      const data = await res.json();
      if (data.erro && data.erro.includes("Sessão")) return logout();
      alert("Excluído.");
      carregarMapas();
    } catch {
      alert("Erro ao excluir.");
    }
  }

  function editar(indice) {
    const item = registrosAtuais[indice];
    if (!item) return;
    document.getElementById("id").value = item.ID || "";
    document.getElementById("mapa").value = item.Mapa || "";
    document.getElementById("endereco").value = item.Endereco || "";
    document.getElementById("restricao").value = item.Restricao || "";
  }

  function limpar() {
    document.getElementById("id").value = "";
    document.getElementById("mapa").value = "";
    document.getElementById("endereco").value = "";
    document.getElementById("restricao").value = "";
  }

  document.getElementById("salvarBtn").onclick = salvar;
  document.getElementById("limparBtn").onclick = limpar;

  // === Navegação ===
  function abrirPainel() {
    if (!token) return alert("Sessão expirada.");
    // O token já está no sessionStorage; painel.html lê de lá diretamente
    // (sessionStorage é herdado por abas abertas via window.open na mesma origem)
    window.open("painel.html", "_blank");
  }

  function abrirRelatorio() {
    if (!token) return alert("Sessão expirada.");
    window.open("relatorio.html", "_blank");
  }

  function abrirS13() {
    if (!token) return alert("Sessão expirada.");
    window.open("s13.html", "_blank");
  }

  // === Sessão Persistente ===
    if (token) iniciarPainel();
document.getElementById("toggleSenha").onclick = () => {
  const campo = document.getElementById("senha");
  const icone = document.getElementById("toggleSenha");

  if (campo.type === "password") {
    campo.type = "text";
    icone.src = "view.png"; // mostra senha
    icone.alt = "Ocultar senha";
  } else {
    campo.type = "password";
    icone.src = "hide.png"; // esconde senha
    icone.alt = "Mostrar senha";
  }
};
</script>
</body>
</html>
