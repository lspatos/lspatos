<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="fav_icon.ico" type="image/x-icon">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="theme-color" content="#5c3d89">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>LS Mapas — Patos de Minas</title>
  <link rel="stylesheet" href="style.css">
  <script src="theme.js"></script>
  <style>
    .hero {
      position: relative;
      overflow: hidden;
      background: linear-gradient(155deg, var(--roxo-700) 0%, var(--roxo-600) 55%, var(--roxo-400) 130%);
      color: #fff;
      padding: 30px 20px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .hero::before {
      content: "";
      position: absolute;
      top: -80px; right: -80px;
      width: 260px; height: 260px;
      border-radius: 50%;
      background: rgba(255,255,255,.08);
    }
    .hero::after {
      content: "";
      position: absolute;
      bottom: 10px; left: -60px;
      width: 160px; height: 160px;
      border-radius: 50%;
      background: rgba(255,255,255,.06);
    }
    .hero-texto { position: relative; z-index: 1; text-align: center; }
    .hero .selo-app {
      width: 52px; height: 52px;
      border-radius: var(--raio-sm);
      background: rgba(255,255,255,.14);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 14px;
    }
    .hero .selo-app img { width: 28px; height: 28px; }
    .hero h1 { color: #fff; font-size: 26px; letter-spacing: .2px; animation: subir-fade .5s ease both; }
    .hero p { color: rgba(255,255,255,.82); font-size: 14.5px; margin-top: 6px; animation: subir-fade .5s .08s ease both; }
    .hero-ilustracao {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 300px;
      margin: 6px auto -14px;
      animation: subir-fade .6s .16s ease both;
    }
    .hero-ilustracao img { width: 100%; height: auto; display: block; }

    @keyframes subir-fade {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @media (prefers-reduced-motion: reduce) {
      .hero h1, .hero p, .hero-ilustracao { animation: none; }
    }

    @media (min-width: 720px) {
      .hero {
        flex-direction: row;
        justify-content: center;
        gap: 40px;
        padding: 46px 40px;
      }
      .hero-texto { text-align: left; }
      .hero .selo-app { margin: 0 0 14px; }
      .hero-ilustracao { max-width: 340px; margin: 0; order: 2; }
    }

    main { max-width: 960px; margin: 0 auto; padding: 0 16px; }

    .secao-titulo {
      display: flex; align-items: baseline; justify-content: space-between;
      margin: 26px 4px 12px;
    }
    .secao-titulo h2 { font-size: 15px; color: var(--cinza-700); font-weight: 700; text-transform: uppercase; letter-spacing: .06em; }
    .secao-titulo span { font-size: 13px; color: var(--cinza-400); font-family: var(--fonte-dado); }

    .grade-mapas {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 12px;
    }
    .cartao-mapa {
      background: #fff;
      border-radius: var(--raio-md);
      box-shadow: var(--sombra-card);
      padding: 16px 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      transition: transform .12s ease, box-shadow .12s ease;
    }
    .cartao-mapa:active { transform: scale(0.96); }
    .cartao-mapa:hover { box-shadow: var(--sombra-flutuante); }
    .cartao-mapa .selo-territorio { width: 52px; height: 52px; font-size: 18px; border-radius: var(--raio-md); }
    .cartao-mapa .rotulo-mapa { font-size: 12.5px; color: var(--cinza-700); font-weight: 600; }

    .estado-vazio, .estado-erro {
      grid-column: 1 / -1;
      text-align: center;
      color: var(--cinza-400);
      padding: 30px 10px;
      font-size: 14px;
    }

    .acesso-admin {
      display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin: 22px 0 30px;
    }

    /* Popover de "reportar endereço novo" (mesmo padrão visual usado em
       mapa.html para o alerta de mudança/falecimento) */
    .popover-alerta {
      position: fixed; inset: 0;
      background: rgba(33,27,43,.5);
      display: flex; align-items: flex-end; justify-content: center;
      z-index: 998;
    }
    .popover-alerta .conteudo {
      background: #fff; width: 100%; max-width: 420px;
      border-radius: 18px 18px 0 0; padding: 22px 20px 26px;
    }
    .popover-alerta h3 { font-size: 16px; margin-bottom: 4px; }
    .popover-alerta p { font-size: 13px; color: var(--cinza-700); margin-bottom: 16px; }
    .popover-alerta input { margin-bottom: 12px; }
    .popover-alerta button.cancelar {
      display: block; width: 100%; text-align: center;
      background: none; border: none; color: var(--cinza-400);
      padding: 10px; margin-top: 8px; font-size: 14px; cursor: pointer;
    }
    @media (min-width: 480px) {
      .popover-alerta { align-items: center; }
      .popover-alerta .conteudo { border-radius: var(--raio-lg); }
    }
  </style>
</head>
<body>
  <header class="hero">
    <div class="hero-texto">
      <div class="selo-app"><img src="icon-192.png" alt=""></div>
      <h1>LS Mapas</h1>
      <p>Congregação de Libras — Patos de Minas</p>
    </div>
    <div class="hero-ilustracao">
      <img src="ilustracao_hero.svg" alt="Ilustração de uma pessoa explorando um mapa" />
    </div>
  </header>

  <main>
    <div class="acesso-admin">
      <button class="btn btn-secundario" id="btnReportarNovo">
        📍 Reportar endereço novo
      </button>
      <button class="btn btn-secundario" onclick="window.location.href='admin.html'">
        🔐 Acessar administração
      </button>
    </div>

    <div class="secao-titulo">
      <h2>Territórios</h2>
      <span id="contagemMapas"></span>
    </div>

    <section class="grade-mapas" id="grade">
      <p class="estado-vazio">Carregando territórios…</p>
    </section>

    <div class="secao-titulo" style="margin-top:34px;">
      <h2>Antes de sair a campo</h2>
    </div>
    <div class="rodape-info">
      <ul>
        <li>Não se esqueça de atualizar o servo de mapas.</li>
        <li>Atente-se às observações de endereços.</li>
        <li>Certifique-se de trabalhar no mapa designado.</li>
      </ul>
    </div>
  </main>

  <script>
    const workerURL = "https://ls-mapas-proxy.lspatosdeminas.workers.dev/";

    async function carregarMapas() {
      const grade = document.getElementById("grade");
      try {
        const res = await fetch(`${workerURL}?acao=read&aba=mapas`);
        const dados = await res.json();
        const nomes = [...new Set((dados.registros || []).map(r => (r.Mapa || "").trim()).filter(Boolean))]
          .sort((a, b) => a.localeCompare(b, "pt-BR", { numeric: true }));

        if (nomes.length === 0) {
          grade.innerHTML = "<p class='estado-vazio'>Nenhum território cadastrado ainda.</p>";
          return;
        }

        document.getElementById("contagemMapas").textContent = `${nomes.length} ao todo`;
        grade.innerHTML = nomes.map(nome => {
          const numero = nome.replace(/\D/g, "") || nome;
          return `
            <a href="mapa.html?mapa=${encodeURIComponent(numero)}" class="cartao-mapa">
              <span class="selo-territorio">${numero}</span>
              <span class="rotulo-mapa">${nome}</span>
            </a>`;
        }).join("");
      } catch (err) {
        console.error(err);
        grade.innerHTML = "<p class='estado-erro'>📡 Não foi possível carregar os territórios agora. Verifique sua internet e recarregue a página.</p>";
      }
    }

    carregarMapas();

    // ==========================
    // REPORTAR ENDEREÇO NOVO
    // O publicador só informa o endereço e o próprio nome - quem decide em
    // qual mapa ele entra é o administrador, no painel (fica pendente até lá).
    // ==========================
    function abrirPopoverSugestao() {
      const overlay = document.createElement("div");
      overlay.className = "popover-alerta";
      overlay.innerHTML = `
        <div class="conteudo">
          <h3>📍 Reportar endereço novo</h3>
          <p>Encontrou um endereço que ainda não está em nenhum mapa? Avise aqui — o administrador vai conferir e adicionar ao mapa certo.</p>
          <input type="text" id="enderecoSugestao" placeholder="Endereço completo (rua, número, bairro)">
          <input type="text" id="nomeSugestao" placeholder="Seu nome">
          <button class="btn btn-primario btn-bloco" id="enviarSugestaoBtn">Enviar</button>
          <button class="cancelar" type="button">Cancelar</button>
        </div>`;
      document.body.appendChild(overlay);

      overlay.querySelector(".cancelar").addEventListener("click", () => overlay.remove());
      overlay.addEventListener("click", (e) => { if (e.target === overlay) overlay.remove(); });

      overlay.querySelector("#enviarSugestaoBtn").addEventListener("click", async () => {
        const endereco = overlay.querySelector("#enderecoSugestao").value.trim();
        const nome = overlay.querySelector("#nomeSugestao").value.trim();
        if (!endereco || !nome) {
          alert("Preencha o endereço e seu nome antes de enviar.");
          return;
        }
        const btn = overlay.querySelector("#enviarSugestaoBtn");
        btn.disabled = true;
        btn.textContent = "Enviando...";
        try {
          await fetch(workerURL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ acao: "sugerir-endereco", endereco, responsavel: nome })
          });
          overlay.remove();
          alert("Endereço enviado! O administrador vai conferir e adicionar ao mapa certo.");
        } catch {
          alert("Sem conexão agora. Tente novamente daqui a pouco.");
          btn.disabled = false;
          btn.textContent = "Enviar";
        }
      });
    }

    document.getElementById("btnReportarNovo").addEventListener("click", abrirPopoverSugestao);

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js")
          .catch(err => console.warn("Falha ao registrar service worker:", err));
      });
    }
  </script>
</body>
</html>
