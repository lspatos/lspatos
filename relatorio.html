<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#5c3d89" />
  <link rel="icon" href="fav_icon.ico" type="image/x-icon">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Relatório — LS Mapas</title>
  <link rel="stylesheet" href="style.css">

  <style>
    @page {
      size: A4 landscape;
      margin: 10mm;
    }

    html, body {
      background: #f8f7fb;
      color: #333;
      margin: 0;
      padding: 0;
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
    }

    h1 {
      text-align: center;
      color: var(--roxo-700);
      margin: 20px 0 10px;
      font-size: 26px;
    }

    .top-bar {
      position: sticky;
      top: 0;
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 10px;
      background: #fff;
      border-bottom: 2px solid var(--roxo-100);
      z-index: 100;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    /* layout visual responsivo */
    .relatorio {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      padding: 15px;
      max-width: 1100px;
      margin: 0 auto;
    }

    @media (min-width: 900px) {
      .relatorio {
        grid-template-columns: 1fr 1fr;
      }
    }

    .mapa-card {
      background: white;
      border-radius: var(--raio-md);
      box-shadow: var(--sombra-card);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: transform 0.2s ease;
    }

    .mapa-card:hover {
      transform: scale(1.01);
    }

    .mapa-header {
      background: linear-gradient(135deg, var(--roxo-700), var(--roxo-400));
      color: white;
      text-align: center;
      font-family: var(--fonte-display);
      font-weight: 600;
      font-size: 16px;
      padding: 8px 0;
    }

    .mapa-body {
      padding: 12px 16px;
    }

    .mapa-body ol {
      margin: 0;
      padding-left: 20px;
      font-size: 14px;
      list-style-position: inside;
    }

    .mapa-body li {
      margin: 4px 0;
      padding: 2px 5px;
      border-radius: 4px;
      line-height: 1.4em;
      overflow-wrap: break-word;
    }

    .restrito {
      background: var(--ambar-bg);
      color: #7A5417;
      font-weight: 600;
    }

    /* layout fixo p/ impressão */
    @media print {
      h1, .top-bar { display: none !important; }
      body { background: white; margin: 0; }

      .pagina {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        grid-template-rows: repeat(2, 1fr);
        gap: 10mm;
        width: 277mm;
        height: 190mm;
        margin: 0 auto;
        page-break-after: always;
        box-sizing: border-box;
      }

      .mapa-card {
        box-shadow: none;
        border: 1px solid #ddd;
      }
    }
  </style>
</head>

<body>
  <h1>Relatório de territórios</h1>

  <div class="top-bar">
    <button class="btn btn-secundario" onclick="voltar()">⬅ Voltar ao Admin</button>
    <button class="btn btn-primario" onclick="window.print()">📄 Gerar PDF</button>
  </div>

  <div id="relatorioContainer"></div>

  <script>
    const workerURL = "https://ls-mapas-proxy.lspatosdeminas.workers.dev/";
    const token = sessionStorage.getItem("authToken");

    if (!token) {
      document.body.innerHTML = "<h3 style='text-align:center;color:#5a2d82;margin-top:50px;'>Acesso negado. Faça login pelo admin.</h3>";
      throw new Error("Token ausente");
    }

    async function carregarMapas() {
      try {
        const res = await fetch(`${workerURL}?acao=read&aba=mapas`, {
          headers: { "x-auth-token": token }
        });
        const dados = await res.json();

        if (dados.erro && dados.erro.includes("Sessão")) {
          alert("Sessão expirada. Faça login novamente.");
          window.location.href = "admin.html";
          return;
        }

        gerarRelatorio(dados.registros || []);
      } catch (err) {
        console.error("Erro ao carregar mapas:", err);
        document.body.innerHTML = "<h3 style='text-align:center;color:#5a2d82;margin-top:50px;'>Erro ao carregar mapas.</h3>";
      }
    }

    function gerarRelatorio(dados) {
      const container = document.getElementById("relatorioContainer");
      container.innerHTML = "";

      const grupos = agruparPorMapa(dados);
      const mapas = Object.keys(grupos).sort();

      let pagina = document.createElement("div");
      pagina.className = "pagina";
      container.appendChild(pagina);

      mapas.forEach((mapa, i) => {
        const card = criarCardMapa(mapa, grupos[mapa]);
        pagina.appendChild(card);

        // cria nova página a cada 4 mapas
        if ((i + 1) % 4 === 0 && i < mapas.length - 1) {
          pagina = document.createElement("div");
          pagina.className = "pagina";
          container.appendChild(pagina);
        }
      });
    }

    function agruparPorMapa(dados) {
      const grupos = {};
      dados.forEach(linha => {
        const mapa = linha.Mapa || "Sem Mapa";
        if (!grupos[mapa]) grupos[mapa] = [];
        grupos[mapa].push(linha);
      });
      return grupos;
    }

    function criarCardMapa(nomeMapa, linhas) {
      const card = document.createElement("div");
      card.className = "mapa-card";

      const header = document.createElement("div");
      header.className = "mapa-header";
      header.textContent = nomeMapa;
      card.appendChild(header);

      const body = document.createElement("div");
      body.className = "mapa-body";

      const lista = document.createElement("ol");
      linhas.forEach(l => {
        const item = document.createElement("li");
        item.textContent = l.Endereco || "";
        const restricao = (l.Restricao || "").toUpperCase();
        if (restricao.includes("ANCI") || restricao.includes("IDOSO"))
          item.classList.add("restrito");
        lista.appendChild(item);
      });

      body.appendChild(lista);
      card.appendChild(body);
      return card;
    }

    function voltar() {
      window.location.href = "admin.html";
    }

    carregarMapas();
  </script>
</body>
</html>
